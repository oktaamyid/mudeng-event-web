<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUDENG OG Image Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1a1a1a;
        }
        
        .og-container {
            width: 1200px;
            height: 630px;
            position: relative;
            overflow: hidden;
            background-color: #f8f9fa;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Mesh Gradient Blobs */
        .blob {
            position: absolute;
            filter: blur(100px);
            opacity: 0.65;
            border-radius: 50%;
            z-index: 1;
            animation: pulse 10s ease-in-out infinite alternate;
        }
        
        .blob-1 {
            width: 700px;
            height: 700px;
            background: #6849E1;
            top: -200px;
            left: -150px;
        }

        .blob-2 {
            width: 650px;
            height: 650px;
            background: #FF7EB3;
            bottom: -200px;
            right: -100px;
            opacity: 0.45;
        }

        .blob-3 {
            width: 500px;
            height: 500px;
            background: #7C7AEA;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.35;
        }

        /* Noise & Texture */
        .noise {
            position: absolute;
            inset: 0;
            z-index: 2;
            opacity: 0.45;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            mix-blend-mode: overlay;
        }

        .grid-pattern {
            position: absolute;
            inset: 0;
            z-index: 1;
            background-size: 50px 50px;
            background-image: 
                linear-gradient(to right, rgba(104, 73, 225, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(104, 73, 225, 0.05) 1px, transparent 1px);
        }

        /* Logo Container */
        .logo-wrapper {
            position: relative;
            z-index: 10;
        }

        .logo-wrapper img {
            height: 220px; /* Diperbesar agar seimbang dengan ukuran 1200x630 */
            object-fit: contain;
            filter: drop-shadow(0 20px 40px rgba(104, 73, 225, 0.15));
        }
    </style>
</head>
<body>

    <div class="og-container">
        <!-- Background Decor -->
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="grid-pattern"></div>
        <div class="noise"></div>

        <!-- MUDENG Logo -->
        <div class="logo-wrapper">
            <img src="https://cdn.mudeng.oktaa.my.id/logo/logo-monogram.svg" alt="MUDENG Logo">
        </div>
    </div>

</body>
</html>
